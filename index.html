<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.navbar a{margin:0 10px;cursor:pointer}

.btn{
background:#4a6cf7;
color:white;
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* HOME */
.hero{
text-align:center;
padding:70px;
background:#4a6cf7;
color:white;
}

/* BUILDER */
#builder{display:none;padding:20px}

.container{display:flex;gap:20px}

.form{width:40%}
.preview{width:60%;background:white;padding:20px}

/* INPUT */
input,textarea{
width:100%;
padding:10px;
margin:8px 0;
}

/* LOGIN */
#loginBox{
display:none;
position:fixed;
top:30%;
left:40%;
background:white;
padding:20px;
box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
<h2>ResumeBuilder</h2>
<div>
<a onclick="goHome()">Home</a>
<a onclick="showResume()">Resume</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="showLogin()">Login</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<!-- HOME -->
<div id="home">
<div class="hero">
<h1>Build Your Resume Easily</h1>
<button class="btn" onclick="startBuilder()">Create Resume</button>
</div>
</div>

<!-- BUILDER -->
<div id="builder">
<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
<hr>
<div id="contentArea">Start filling form...</div>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
const $ = id => document.getElementById(id);

let mode="resume";

/* NAV */
function startBuilder(){
$("home").style.display="none";
$("builder").style.display="block";
showResume();
}

function goHome(){
$("home").style.display="block";
$("builder").style.display="none";
}

/* RESUME */
function showResume(){
mode="resume";

$("formArea").innerHTML=`
<h2>Resume Details</h2>

<input id="fullName" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<textarea id="summary" placeholder="Summary"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>

<button class="btn" onclick="saveResume()">Save</button>
`;

listen();
}

/* COVER */
function showCover(){
mode="cover";

$("formArea").innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company">
<input id="role" placeholder="Role">

<textarea id="letter" placeholder="Write letter"></textarea>

<button class="btn" onclick="saveCover()">Save</button>
`;

listen();
}

/* LIVE LISTENER (FIXED) */
function listen(){
document.oninput=()=>{
if(mode==="resume") updateResume();
else updateCover();
};
}

/* RESUME PREVIEW (FIXED NAME ISSUE) */
function updateResume(){
const n=$("fullName")?.value||"";
const e=$("email")?.value||"";
const p=$("phone")?.value||"";
const l=$("location")?.value||"";

$("contentArea").innerHTML=`
<h2>${n}</h2>
<p>${l} | ${p} | ${e}</p>
<hr>
<p><b>Summary:</b><br>${$("summary")?.value||""}</p>
<p><b>Skills:</b><br>${$("skills")?.value||""}</p>
<p><b>Education:</b><br>${$("education")?.value||""}</p>
<p><b>Experience:</b><br>${$("experience")?.value||""}</p>
`;
}

/* COVER PREVIEW */
function updateCover(){
$("contentArea").innerHTML=`
<h2>${$("cname")?.value||""}</h2>
<p>To: ${$("company")?.value||""}</p>
<p>Role: ${$("role")?.value||""}</p>
<hr>
<p>${$("letter")?.value||""}</p>
`;
}

/* SAVE RESUME */
function saveResume(){
localStorage.setItem("resume",JSON.stringify({
name:$("fullName").value,
email:$("email").value,
phone:$("phone").value,
location:$("location").value,
summary:$("summary").value,
skills:$("skills").value,
education:$("education").value,
experience:$("experience").value
}));
downloadPDF();
}

/* SAVE COVER */
function saveCover(){
localStorage.setItem("cover",JSON.stringify({
name:$("cname").value,
company:$("company").value,
role:$("role").value,
letter:$("letter").value
}));
downloadPDF();
}

/* PDF */
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text(doc.splitTextToSize($("contentArea").innerText,180),10,10);
doc.save(mode==="cover"?"cover.pdf":"resume.pdf");
}

/* LOGIN */
function showLogin(){
$("loginBox").style.display="block";
}

function login(){
localStorage.setItem("user",$("user").value);
localStorage.setItem("pass",$("pass").value);
alert("Saved");
$("loginBox").style.display="none";
}
</script>

</body>
</html>
