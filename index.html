<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Resume Builder</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
.navbar{display:flex;justify-content:space-between;padding:15px 40px;background:#fff}
.navbar a{margin:0 10px;text-decoration:none;color:#333;cursor:pointer}
.btn{padding:8px 15px;background:#4a6cf7;color:#fff;border:none;border-radius:5px;cursor:pointer}
.hero{background:linear-gradient(to right,#4a6cf7,#6a8dff);color:#fff;text-align:center;padding:50px}
.templates{padding:30px;text-align:center}
.cards{display:flex;justify-content:center;gap:20px}
.card{width:200px;height:120px;background:#ddd;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.container{display:none;padding:20px}
.form{width:40%;background:#fff;padding:20px}
.resume{width:60%;background:#fff;margin-left:20px;padding:20px}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5)}
.modal-content{background:#fff;padding:20px;margin:10% auto;width:300px}
</style>
</head>
<body>

<div class="navbar">
<h3>ResumeBuilder</h3>
<div>
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('builder')">Resume</a>
<a onclick="alert('Cover Letter Coming Soon')">Cover Letter</a>
<a onclick="openLogin()">Sign In</a>
<button class="btn" onclick="showSection('builder')">Get Started</button>
</div>
</div>

<div id="home">
<div class="hero">
<h1>Create My Resume</h1>
<button class="btn" onclick="showSection('builder')">Create My Resume</button>
<button class="btn" onclick="uploadResume()">Upload Resume</button>
</div>

<div class="templates">
<h2>Choose Template</h2>
<div class="cards">
<div class="card" onclick="selectTemplate('template1')">Template 1</div>
<div class="card" onclick="selectTemplate('template2')">Template 2</div>
<div class="card" onclick="selectTemplate('template3')">Template 3</div>
</div>
</div>
</div>

<div id="builder" class="container">
<div class="form">
<h2>Enter Details</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<button onclick="generateResume()">Generate</button>
</div>
<div class="resume" id="output">
<h2>Resume Preview</h2>
</div>
</div>

<div id="loginModal" class="modal">
<div class="modal-content">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<script>
function showSection(section){
 document.getElementById('home').style.display='none';
 document.getElementById('builder').style.display='none';
 document.getElementById(section).style.display='block';
}

function openLogin(){document.getElementById('loginModal').style.display='block'}

function login(){
 let u=document.getElementById('user').value;
 let p=document.getElementById('pass').value;
 if(u&&p){alert('Welcome '+u);document.getElementById('loginModal').style.display='none'}
 else{alert('Enter details')}
}

function selectTemplate(temp){
 alert(temp+' selected');
 showSection('builder');
}

function uploadResume(){
 alert('Upload feature (demo)');
}

function generateResume(){
 let name=document.getElementById('name').value;
 let email=document.getElementById('email').value;
 let skills=document.getElementById('skills').value;
 let edu=document.getElementById('education').value;

 document.getElementById('output').innerHTML=`
 <h1>${name}</h1>
 <p>${email}</p>
 <h3>Skills</h3><p>${skills}</p>
 <h3>Education</h3><p>${edu}</p>`;
}

window.onclick=function(e){
 if(e.target==document.getElementById('loginModal')){
 document.getElementById('loginModal').style.display='none'}
}
</script>

</body>
</html>
