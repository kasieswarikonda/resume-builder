<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Builder</title>
<style>
body{margin:0;font-family:Arial}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.navbar a{margin:0 10px;cursor:pointer;text-decoration:none;color:#333}
.btn{
background:#4a6cf7;
color:#fff;
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

/* HERO */
.hero{
background:linear-gradient(to right,#4a6cf7,#6a8dff);
color:#fff;
text-align:center;
padding:70px;
}

/* FEATURES */
.features{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}
.feature-box{
background:#f4f4f4;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
}

/* BUILDER */
#builder{
display:none;
padding:40px;
}
.container{
display:flex;
gap:20px;
}
input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

/* PREVIEW */
#preview{
width:60%;
background:#f4f4f4;
padding:20px;
}
.form{
width:40%;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h3>ResumeBuilder</h3>
<div>
<a onclick="goHome()">Resume</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="login()">Sign In</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<!-- HERO -->
<div id="home">
<div class="hero">
<h1>Create a Professional Resume</h1>
<p>Build your resume quickly with our easy builder</p>

<button class="btn" onclick="startBuilder()">Create My Resume</button>
<button class="btn" onclick="uploadResume()">Upload Resume</button>
</div>

<!-- FEATURES -->
<div class="features">
<div class="feature-box">AI Writer</div>
<div class="feature-box">Easy to Match</div>
<div class="feature-box">Helpful Resources</div>
</div>
</div>

<!-- BUILDER -->
<div id="builder">
<div class="container">

<!-- FORM -->
<div class="form">
<h2>Enter Details</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="edu" placeholder="Education"></textarea>
<textarea id="exp" placeholder="Experience"></textarea>

</div>

<!-- PREVIEW -->
<div id="preview">
<h2>Live Resume Preview</h2>
</div>

</div>
</div>

<script>

/* NAVIGATION */
function goHome(){
location.reload();
}

function startBuilder(){
document.getElementById("home").style.display="none";
document.getElementById("builder").style.display="block";
}

/* LIVE UPDATE */
document.addEventListener("input", updateResume);

function updateResume(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let skills=document.getElementById("skills").value;
let edu=document.getElementById("edu").value;
let exp=document.getElementById("exp").value;

document.getElementById("preview").innerHTML=`
<h1>${name}</h1>
<p>${email} | ${phone}</p>

<h3>Skills</h3>
<p>${skills}</p>

<h3>Education</h3>
<p>${edu}</p>

<h3>Experience</h3>
<p>${exp}</p>
`;
}

/* UPLOAD */
function uploadResume(){
let input=document.createElement("input");
input.type="file";
input.click();
}

/* COVER LETTER */
function showCover(){
startBuilder();
document.getElementById("preview").innerHTML=`
<h2>Cover Letter</h2>
<p>Dear Hiring Manager,</p>
<p>I am interested in this position...</p>
`;
}

/* LOGIN */
function login(){
alert("Login requires backend (not included)");
}

</script>

</body>
</html>
