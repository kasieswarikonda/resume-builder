<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.navbar h2{color:#4a6cf7}
.navbar a{margin:0 10px;cursor:pointer}

.btn{
background:#4a6cf7;
color:#fff;
padding:8px 15px;
border:none;
cursor:pointer;
border-radius:5px;
}

/* HERO */
.hero{
background:linear-gradient(to right,#4a6cf7,#6a8dff);
color:white;
text-align:center;
padding:80px;
}

.features{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}

.box{
background:#f4f4f4;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
}

/* BUILDER */
#builder{
display:none;
padding:20px;
}

.container{
display:flex;
gap:20px;
}

.form{width:40%}
.preview{
width:60%;
background:#fff;
padding:20px;
border:1px solid #ccc;
}

input,textarea{
width:100%;
margin:8px 0;
padding:10px;
}

/* LOGIN */
#loginBox{
display:none;
position:fixed;
top:30%;
left:40%;
background:white;
padding:20px;
box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>ResumeBuilder</h2>
<div>
<a onclick="goHome()">Home</a>
<a onclick="showResume()">Resume</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="showLogin()">Login</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<!-- HOME -->
<div id="home">
<div class="hero">
<h1>Create Professional Resume</h1>
<p>Build Resume & Cover Letter Easily</p>
<button class="btn" onclick="startBuilder()">Start</button>
</div>

<div class="features">
<div class="box">Fast</div>
<div class="box">Easy</div>
<div class="box">Free</div>
</div>
</div>

<!-- BUILDER -->
<div id="builder">
<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
<hr>
<div id="contentArea">Start entering details...</div>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<script>

let mode="resume";

/* NAVIGATION */
function startBuilder(){
home.style.display="none";
builder.style.display="block";
showResume();
}

function goHome(){
home.style.display="block";
builder.style.display="none";
}

/* ================= RESUME ================= */
function showResume(){
mode="resume";

formArea.innerHTML=`
<h2>Resume Builder</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<textarea id="summary" placeholder="Summary"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="achievements" placeholder="Achievements"></textarea>

<button class="btn" onclick="saveData()">Save</button>
`;

loadResumeData();
attachResumeListener();
}

/* SAVE RESUME */
function saveData(){

let data={
name:document.getElementById("name").value||"",
email:document.getElementById("email").value||"",
phone:document.getElementById("phone").value||"",
location:document.getElementById("location").value||"",
summary:document.getElementById("summary").value||"",
skills:document.getElementById("skills").value||"",
education:document.getElementById("education").value||"",
experience:document.getElementById("experience").value||"",
projects:document.getElementById("projects").value||"",
achievements:document.getElementById("achievements").value||""
};

localStorage.setItem("resumeData",JSON.stringify(data));

alert("Resume Saved");
downloadPDF();
}

/* LOAD RESUME */
function loadResumeData(){
let data=JSON.parse(localStorage.getItem("resumeData")||"{}");

setTimeout(()=>{
if(document.getElementById("name")){
name.value=data.name||"";
email.value=data.email||"";
phone.value=data.phone||"";
location.value=data.location||"";
summary.value=data.summary||"";
skills.value=data.skills||"";
education.value=data.education||"";
experience.value=data.experience||"";
projects.value=data.projects||"";
achievements.value=data.achievements||"";
}
},100);
}

/* RESUME PREVIEW */
function attachResumeListener(){

document.addEventListener("input",function(){

if(mode!=="resume") return;

let html="";

if(name.value) html+=`<h2 style="text-align:center">${name.value}</h2>`;

if(email.value||phone.value||location.value)
html+=`<p style="text-align:center">
${location.value} ${phone.value?"|"+phone.value:""} ${email.value?"|"+email.value:""}
</p>`;

if(summary.value) html+=`<hr><h3>Summary</h3><p>${summary.value}</p>`;
if(skills.value) html+=`<hr><h3>Skills</h3><p>${skills.value}</p>`;
if(education.value) html+=`<hr><h3>Education</h3><p>${education.value}</p>`;
if(experience.value) html+=`<hr><h3>Experience</h3><p>${experience.value}</p>`;
if(projects.value) html+=`<hr><h3>Projects</h3><p>${projects.value}</p>`;
if(achievements.value) html+=`<hr><h3>Achievements</h3><p>${achievements.value}</p>`;

contentArea.innerHTML=html;
});
}

/* ================= COVER LETTER ================= */
function showCover(){
mode="cover";

formArea.innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company">
<input id="role" placeholder="Role">
<textarea id="letter" placeholder="Write letter"></textarea>

<button class="btn" onclick="saveCover()">Save</button>
`;

loadCoverData();
attachCoverListener();
}

/* SAVE COVER */
function saveCover(){

let data={
cn:cname.value||"",
comp:company.value||"",
role:role.value||"",
letter:letter.value||""
};

localStorage.setItem("coverData",JSON.stringify(data));

alert("Cover Letter Saved");
downloadPDF();
}

/* LOAD COVER */
function loadCoverData(){
let data=JSON.parse(localStorage.getItem("coverData")||"{}");

setTimeout(()=>{
if(document.getElementById("cname")){
cname.value=data.cn||"";
company.value=data.comp||"";
role.value=data.role||"";
letter.value=data.letter||"";
}
},100);
}

/* COVER LISTENER */
function attachCoverListener(){

document.addEventListener("input",function(){

if(mode!=="cover") return;

let cn=cname.value||"";
let comp=company.value||"";
let roleVal=role.value||"";
let letterVal=letter.value||"";

contentArea.innerHTML=`
<h2>${cn}</h2>
<p><b>To:</b> ${comp}</p>
<p><b>Subject:</b> ${roleVal}</p>
<p>${letterVal}</p>
`;
});
}

/* LOGIN */
function showLogin(){loginBox.style.display="block";}
function login(){
alert("Login Saved");
loginBox.style.display="none";
}

/* PDF */
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.html(contentArea,{
callback:function(doc){
doc.save("document.pdf");
}
});
}

</script>

</body>
</html>
