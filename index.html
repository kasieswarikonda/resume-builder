<!DOCTYPE html>
<html>
<head>
<title>Resume Builder Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="loginPage">
  <h2>Login</h2>

  <input id="loginEmail" placeholder="Email">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ================= MAIN APP ================= -->
<div id="app" class="app hidden">

<!-- TOP BAR -->
<div class="topbar">
  <h2>Resume Builder</h2>

  <button onclick="saveData()">Save</button>
  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- LEFT INPUT -->
<div class="left">

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<h3>Resume</h3>
<textarea id="summary" placeholder="Summary"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="achievements" placeholder="Achievements"></textarea>

<h3>Cover Letter</h3>
<textarea id="coverLetter" placeholder="Cover Letter"></textarea>

<button onclick="renderResume()">Preview Resume</button>
<button onclick="renderCover()">Preview Cover Letter</button>

</div>

<!-- RIGHT PREVIEW -->
<div class="right">
<div id="preview" class="preview">Start typing...</div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
