<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial}

/* NAVBAR */
.navbar{
display:flex;justify-content:space-between;align-items:center;
padding:15px 40px;background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.navbar div{display:flex;gap:25px;}
.btn{background:#4a6cf7;color:#fff;padding:8px 15px;border:none;border-radius:5px;cursor:pointer;}

.hero{background:linear-gradient(to right,#4a6cf7,#6a8dff);color:white;text-align:center;padding:80px;}
.features{display:flex;justify-content:center;gap:20px;padding:40px;}
.box{background:#f4f4f4;padding:20px;border-radius:10px;width:200px;text-align:center;}

#builder{display:none;padding:20px;}
.container{display:flex;gap:20px;}
.form{width:40%;}
.preview{width:60%;background:#fff;padding:20px;border:1px solid #ccc;}

input,textarea{width:100%;margin:8px 0;padding:10px;}
</style>
</head>

<body>

<div class="navbar">
<h2>ResumeBuilder</h2>
<div>
<a onclick="goHome()">Resume</a>
<a onclick="showResume()">Resume Builder</a>
<a onclick="showCover()">Cover Letter</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<div id="home">
<div class="hero">
<h1>Create Resume Easily</h1>
<button class="btn" onclick="startBuilder()">Create My Resume</button>
</div>
</div>

<div id="builder">
<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<div style="display:flex;justify-content:space-between;">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>
<hr>
<div id="contentArea">Start entering details...</div>
</div>

</div>
</div>

<script>

/* NAVIGATION */
function startBuilder(){
home.style.display="none";
builder.style.display="block";
showResume();
}
function goHome(){
home.style.display="block";
builder.style.display="none";
}

/* ================= RESUME ================= */
function showResume(){
formArea.innerHTML=`
<h2>Resume</h2>
<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<textarea id="summary" placeholder="Summary"></textarea>
<button class="btn" onclick="saveResume()">Save Resume</button>
`;
loadResume();
}

function saveResume(){
let data={
name:document.getElementById("name").value,
email:document.getElementById("email").value,
summary:document.getElementById("summary").value
};
localStorage.setItem("resumeData",JSON.stringify(data));
alert("Resume Saved!");
}

function loadResume(){
let data=JSON.parse(localStorage.getItem("resumeData"));
if(!data) return;
name.value=data.name||"";
email.value=data.email||"";
summary.value=data.summary||"";
}

/* ================= COVER LETTER ================= */
function showCover(){
startBuilder();

formArea.innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company Name">
<input id="role" placeholder="Job Role">
<textarea id="letter" placeholder="Write your letter"></textarea>

<button class="btn" onclick="saveCover()">Save Cover Letter</button>
`;

loadCover();
}

function saveCover(){
let data={
name:document.getElementById("cname").value,
company:document.getElementById("company").value,
role:document.getElementById("role").value,
letter:document.getElementById("letter").value
};

localStorage.setItem("coverLetterData",JSON.stringify(data));
alert("Cover Letter Saved!");
}

function loadCover(){
let data=JSON.parse(localStorage.getItem("coverLetterData"));
if(!data) return;

cname.value=data.name||"";
company.value=data.company||"";
role.value=data.role||"";
letter.value=data.letter||"";
}

/* ================= LIVE PREVIEW ================= */
document.addEventListener("input",updatePreview);

function updatePreview(){

// RESUME
if(document.getElementById("name")){
contentArea.innerHTML=`
<h2>${name.value}</h2>
<p>${email.value}</p>
<p>${summary.value}</p>
`;
}

// COVER
if(document.getElementById("cname")){
contentArea.innerHTML=`
<h2>${cname.value}</h2>
<p>To: ${company.value}</p>
<p>Subject: ${role.value}</p>
<p>${letter.value}</p>
`;
}
}

/* ================= DOWNLOAD ================= */
function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let text=contentArea.innerText;
let lines=doc.splitTextToSize(text,180);

doc.text(lines,10,10);

window.open(doc.output("bloburl")); // open
doc.save("Document.pdf"); // download
}

</script>

</body>
</html>
