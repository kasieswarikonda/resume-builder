<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial}
.navbar{display:flex;justify-content:space-between;padding:15px 40px;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.btn{background:#4a6cf7;color:#fff;padding:8px 15px;border:none;cursor:pointer;border-radius:5px;}
.hero{background:linear-gradient(to right,#4a6cf7,#6a8dff);color:white;text-align:center;padding:80px;}
.features{display:flex;justify-content:center;gap:20px;padding:40px;}
.box{background:#f4f4f4;padding:20px;border-radius:10px;width:200px;text-align:center;}
#builder{display:none;padding:20px;}
.container{display:flex;gap:20px;}
.form{width:40%;}
.preview{width:60%;background:#fff;padding:20px;border:1px solid #ccc;}
input,textarea{width:100%;margin:8px 0;padding:10px;}
#loginBox{display:none;position:fixed;top:30%;left:40%;background:white;padding:20px;box-shadow:0 0 10px gray;}
</style>
</head>

<body>

<div class="navbar">
<h2>ResumeBuilder</h2>
<div>
<a onclick="goHome()">Resume</a>
<a onclick="showResume()">Resume Builder</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="showLogin()">Sign In</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<div id="home">
<div class="hero">
<h1>Create a Professional Resume</h1>
<button class="btn" onclick="startBuilder()">Create My Resume</button>
<button class="btn" onclick="uploadResume()">Upload Resume</button>
</div>

<div class="features">
<div class="box">AI Writer</div>
<div class="box">Easy to Match</div>
<div class="box">Helpful Resources</div>
</div>
</div>

<div id="builder">
<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<div style="display:flex;justify-content:space-between;">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>
<hr>
<div id="contentArea">Start entering details...</div>
</div>

</div>
</div>

<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<script>

/* NAVIGATION */
function startBuilder(){
document.getElementById("home").style.display="none";
document.getElementById("builder").style.display="block";
showResume();
}
function goHome(){
document.getElementById("home").style.display="block";
document.getElementById("builder").style.display="none";
}

/* RESUME FORM */
function showResume(){
document.getElementById("formArea").innerHTML=`
<h2>Enter Details</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<textarea id="summary" placeholder="Professional Summary"></textarea>
<textarea id="skills" placeholder="Core Competencies"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Work Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="achievements" placeholder="Achievements"></textarea>

<button class="btn" onclick="saveData()">Save Data</button>
`;
}

/* COVER LETTER */
function showCover(){
startBuilder();

document.getElementById("formArea").innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company Name">
<input id="role" placeholder="Job Role">

<textarea id="letter" placeholder="Write your cover letter"></textarea>
`;
}

/* GLOBAL LIVE PREVIEW (NO DUPLICATE) */
document.addEventListener("input", updatePreview);

function updatePreview(){

// RESUME
if(document.getElementById("name")){
let n=document.getElementById("name")?.value||"";
let e=document.getElementById("email")?.value||"";
let p=document.getElementById("phone")?.value||"";
let l=document.getElementById("location")?.value||"";
let s=document.getElementById("summary")?.value||"";
let sk=document.getElementById("skills")?.value||"";
let ed=document.getElementById("education")?.value||"";
let ex=document.getElementById("experience")?.value||"";
let pr=document.getElementById("projects")?.value||"";
let ac=document.getElementById("achievements")?.value||"";

let html="";

if(n) html+=`<h2 style="text-align:center">${n}</h2>`;
if(e||p||l) html+=`<p style="text-align:center">${l} ${p?"| "+p:""} ${e?"| "+e:""}</p>`;

if(s) html+=`<hr><h3>Professional Summary</h3><p>${s}</p>`;
if(ed) html+=`<hr><h3>Education</h3><p>${ed}</p>`;
if(sk) html+=`<hr><h3>Core Competencies</h3><p>${sk}</p>`;
if(ex) html+=`<hr><h3>Work Experience</h3><p>${ex}</p>`;
if(pr) html+=`<hr><h3>Technical Projects</h3><p>${pr}</p>`;
if(ac) html+=`<hr><h3>Honours & Achievements</h3><p>${ac}</p>`;

document.getElementById("contentArea").innerHTML=html||"Start entering details...";
}

// COVER LETTER
if(document.getElementById("cname")){
let cn=document.getElementById("cname")?.value||"";
let comp=document.getElementById("company")?.value||"";
let role=document.getElementById("role")?.value||"";
let letter=document.getElementById("letter")?.value||"";

/* STORE */
localStorage.setItem("coverLetterData",JSON.stringify({cn,comp,role,letter}));

document.getElementById("contentArea").innerHTML=`
<h2>${cn}</h2>
<p>To: ${comp}</p>
<p>Subject: ${role}</p>
<p>${letter}</p>
`;
}
}

/* SAVE DATA (NO AUTO DOWNLOAD) */
function saveData(){

let data={
name:document.getElementById("name")?.value||"",
email:document.getElementById("email")?.value||"",
phone:document.getElementById("phone")?.value||"",
location:document.getElementById("location")?.value||"",
summary:document.getElementById("summary")?.value||"",
skills:document.getElementById("skills")?.value||"",
education:document.getElementById("education")?.value||"",
experience:document.getElementById("experience")?.value||"",
projects:document.getElementById("projects")?.value||"",
achievements:document.getElementById("achievements")?.value||""
};

localStorage.setItem("resumeData",JSON.stringify(data));

alert("Data Saved Successfully!");
}

/* PDF DOWNLOAD (ONLY BUTTON) */
function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let text=document.getElementById("contentArea").innerText;
let lines=doc.splitTextToSize(text,180);

doc.text(lines,10,10);

// OPEN
let url=doc.output("bloburl");
window.open(url);

// DOWNLOAD
doc.save("My_Resume.pdf");
}

/* LOGIN */
function showLogin(){
document.getElementById("loginBox").style.display="block";
}
function login(){
localStorage.setItem("user",document.getElementById("user").value);
localStorage.setItem("pass",document.getElementById("pass").value);
alert("Login Saved");
document.getElementById("loginBox").style.display="none";
}

/* UPLOAD */
function uploadResume(){
let input=document.createElement("input");
input.type="file";
input.click();
}

</script>

</body>
</html>
