<!DOCTYPE html>
<html>
<head>
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7ff;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.navbar h2{color:#4a6cf7}
.navbar a{margin:0 10px;cursor:pointer}

.btn{
background:#4a6cf7;
color:#fff;
padding:8px 15px;
border:none;
cursor:pointer;
border-radius:5px;
}

.secondary{
background:white;
color:#4a6cf7;
border:1px solid #4a6cf7;
}

/* HERO (MATCH IMAGE DESIGN) */
.hero{
position:relative;
background:linear-gradient(120deg,#4a6cf7,#6a8dff);
color:white;
text-align:center;
padding:100px 20px 140px;
overflow:hidden;
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
margin:auto;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

.wave{
position:absolute;
bottom:0;
left:0;
width:100%;
}

/* FEATURES */
.features{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}
.box{
background:#fff;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* BUILDER */
#builder{display:none;padding:20px;}
.container{display:flex;gap:20px;}
.form{width:40%;}
.preview{
width:60%;
background:#fff;
padding:20px;
border:1px solid #ccc;
}

/* INPUT */
input,textarea{
width:100%;
margin:8px 0;
padding:10px;
}

/* LOGIN */
#loginBox{
display:none;
position:fixed;
top:30%;
left:40%;
background:white;
padding:20px;
box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>ResumeBuilder</h2>
<div>
<a onclick="goHome()">Resume</a>
<a onclick="showResume()">Resume Builder</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="showLogin()">Sign In</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<!-- HOME -->
<div id="home">

<div class="hero">
<div class="hero-content">
<h1>Create a Professional Resume</h1>
<p>Build your resume quickly with our easy resume builder</p>

<button class="btn" onclick="startBuilder()">Create My Resume</button>
<button class="btn secondary" onclick="uploadResume()">Upload Resume</button>
</div>

<!-- WAVE -->
<svg class="wave" viewBox="0 0 1440 320">
<path fill="#ffffff" fill-opacity="1"
d="M0,224L80,202.7C160,181,320,139,480,138.7C640,139,800,181,960,208C1120,235,1280,245,1360,250.7L1440,256L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z">
</path>
</svg>

</div>

<div class="features">
<div class="box">AI Writer</div>
<div class="box">Easy to Match</div>
<div class="box">Helpful Resources</div>
</div>
</div>

<!-- BUILDER -->
<div id="builder">
<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<div style="display:flex;justify-content:space-between;">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>
<hr>
<div id="contentArea">Start entering details...</div>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<script>

/* NAV */
function startBuilder(){
home.style.display="none";
builder.style.display="block";
showResume();
}

function goHome(){
home.style.display="block";
builder.style.display="none";
}

/* FORM */
function showResume(){
formArea.innerHTML=`
<h2>Enter Details</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<textarea id="summary" placeholder="Professional Summary"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="achievements" placeholder="Achievements"></textarea>

<button class="btn" onclick="saveData()">Save & Download</button>
`;

attachResumeListener();
}

/* COVER LETTER */
function showCover(){
startBuilder();

formArea.innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company Name">
<input id="role" placeholder="Job Role">

<textarea id="letter" placeholder="Write cover letter"></textarea>

<button class="btn" onclick="downloadPDF()">Download</button>
`;

document.addEventListener("input",()=>{
contentArea.innerHTML=`
<h2>${cname.value}</h2>
<p>To: ${company.value}</p>
<p>Role: ${role.value}</p>
<p>${letter.value}</p>
`;
});
}

/* LOGIN */
function showLogin(){loginBox.style.display="block";}
function login(){
localStorage.setItem("user",user.value);
localStorage.setItem("pass",pass.value);
alert("Saved");
loginBox.style.display="none";
}

/* SAVE */
function saveData(){
localStorage.setItem("resumeData",JSON.stringify({
name:name.value,
email:email.value,
phone:phone.value,
location:location.value,
summary:summary.value,
skills:skills.value,
education:education.value,
experience:experience.value,
projects:projects.value,
achievements:achievements.value
}));

downloadPDF();
}

/* LIVE PREVIEW */
function attachResumeListener(){
document.oninput=function(){

let html="";

if(name.value) html+=`<h2 style="text-align:center">${name.value}</h2>`;
if(email.value||phone.value||location.value)
html+=`<p style="text-align:center">${location.value} | ${phone.value} | ${email.value}</p>`;

if(summary.value) html+=`<hr><h3>Summary</h3><p>${summary.value}</p>`;
if(skills.value) html+=`<hr><h3>Skills</h3><p>${skills.value}</p>`;
if(education.value) html+=`<hr><h3>Education</h3><p>${education.value}</p>`;
if(experience.value) html+=`<hr><h3>Experience</h3><p>${experience.value}</p>`;
if(projects.value) html+=`<hr><h3>Projects</h3><p>${projects.value}</p>`;
if(achievements.value) html+=`<hr><h3>Achievements</h3><p>${achievements.value}</p>`;

contentArea.innerHTML=html || "Start entering details...";
}
}

/* PDF */
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let text = contentArea.innerText;
let lines = doc.splitTextToSize(text,180);

doc.text(lines,10,10);
doc.save("Resume.pdf");
}

/* UPLOAD */
function uploadResume(){
let input=document.createElement("input");
input.type="file";
input.click();
}

</script>

</body>
</html>
