<!DOCTYPE html>
<html>
<head>
<title>Resume Builder Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7ff;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#ffffff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.navbar h2{
color:#4a6cf7;
}

.navbar a{
margin:0 10px;
cursor:pointer;
font-weight:bold;
}

.btn{
background:#4a6cf7;
color:white;
padding:8px 15px;
border:none;
cursor:pointer;
border-radius:6px;
}

.secondary{
background:white;
color:#4a6cf7;
border:1px solid #4a6cf7;
}

/* HERO */
.hero{
background:linear-gradient(120deg,#4a6cf7,#6a8dff);
color:white;
text-align:center;
padding:90px 20px 130px;
}

.hero h1{
font-size:45px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* FEATURES */
.features{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
}

.box{
background:white;
padding:20px;
width:200px;
text-align:center;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* BUILDER */
#builder{
display:none;
padding:20px;
}

.container{
display:flex;
gap:20px;
}

/* FORM */
.form{
width:40%;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* PREVIEW */
.preview{
width:60%;
background:white;
padding:20px;
border-radius:10px;
border:1px solid #ddd;
}

/* INPUTS */
input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* LOGIN */
#loginBox{
display:none;
position:fixed;
top:30%;
left:40%;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>ResumeBuilder Pro</h2>
<div>
<a onclick="goHome()">Home</a>
<a onclick="showResume()">Resume</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="showLogin()">Login</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<!-- HOME -->
<div id="home">

<div class="hero">
<h1>Create Professional Resume</h1>
<p>Build resumes instantly with live preview</p>

<button class="btn" onclick="startBuilder()">Create Resume</button>
<button class="btn secondary" onclick="uploadResume()">Upload</button>
</div>

<div class="features">
<div class="box">Fast Builder</div>
<div class="box">Live Preview</div>
<div class="box">PDF Download</div>
</div>

</div>

<!-- BUILDER -->
<div id="builder">

<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<div style="display:flex;justify-content:space-between;">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>
<hr>
<div id="contentArea">Start entering details...</div>
</div>

</div>

</div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<script>

/* NAVIGATION */
function startBuilder(){
document.getElementById("home").style.display="none";
document.getElementById("builder").style.display="block";
showResume();
}

function goHome(){
document.getElementById("home").style.display="block";
document.getElementById("builder").style.display="none";
}

/* RESUME FORM */
function showResume(){

document.getElementById("formArea").innerHTML=`
<h2>Resume Details</h2>

<input id="fullName" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<textarea id="summary" placeholder="Summary"></textarea>
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="achievements" placeholder="Achievements"></textarea>

<button class="btn" onclick="saveData()">Save & Download</button>
`;

setTimeout(()=>{
attachResumeListener();
loadData();
updatePreview();
},100);
}

/* SAVE */
function saveData(){

const data={
fullName:document.getElementById("fullName").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
location:document.getElementById("location").value,
summary:document.getElementById("summary").value,
skills:document.getElementById("skills").value,
education:document.getElementById("education").value,
experience:document.getElementById("experience").value,
projects:document.getElementById("projects").value,
achievements:document.getElementById("achievements").value
};

localStorage.setItem("resumeData",JSON.stringify(data));
downloadPDF();
}

/* LOAD */
function loadData(){

const saved=localStorage.getItem("resumeData");
if(!saved) return;

const data=JSON.parse(saved);

Object.keys(data).forEach(id=>{
let el=document.getElementById(id);
if(el) el.value=data[id];
});
}

/* FIXED LIVE PREVIEW */
function attachResumeListener(){

let fields=[
"fullName","email","phone","location",
"summary","skills","education","experience","projects","achievements"
];

fields.forEach(id=>{
let el=document.getElementById(id);
if(el){
el.addEventListener("input",updatePreview);
}
});
}

/* ✅ THIS FIX SOLVES YOUR NAME ISSUE */
function updatePreview(){

let fullName=document.getElementById("fullName")?.value || "";
let email=document.getElementById("email")?.value || "";
let phone=document.getElementById("phone")?.value || "";
let location=document.getElementById("location")?.value || "";

let summary=document.getElementById("summary")?.value || "";
let skills=document.getElementById("skills")?.value || "";
let education=document.getElementById("education")?.value || "";
let experience=document.getElementById("experience")?.value || "";
let projects=document.getElementById("projects")?.value || "";
let achievements=document.getElementById("achievements")?.value || "";

let html="";

/* NAME FIXED */
if(fullName.trim()!==""){
html+=`<h2 style="text-align:center">${fullName}</h2>`;
}

if(email || phone || location){
html+=`<p style="text-align:center">${location} | ${phone} | ${email}</p>`;
}

if(summary) html+=`<hr><h3>Summary</h3><p>${summary}</p>`;
if(skills) html+=`<hr><h3>Skills</h3><p>${skills}</p>`;
if(education) html+=`<hr><h3>Education</h3><p>${education}</p>`;
if(experience) html+=`<hr><h3>Experience</h3><p>${experience}</p>`;
if(projects) html+=`<hr><h3>Projects</h3><p>${projects}</p>`;
if(achievements) html+=`<hr><h3>Achievements</h3><p>${achievements}</p>`;

document.getElementById("contentArea").innerHTML=
html || "Start entering details...";
}

/* PDF */
function downloadPDF(){

const { jsPDF }=window.jspdf;
let doc=new jsPDF();

let text=document.getElementById("contentArea").innerText;
let lines=doc.splitTextToSize(text,180);

doc.text(lines,10,10);
doc.save("Resume.pdf");
}

/* LOGIN */
function showLogin(){
document.getElementById("loginBox").style.display="block";
}

function login(){
localStorage.setItem("user",document.getElementById("user").value);
alert("Login saved");
document.getElementById("loginBox").style.display="none";
}

/* COVER LETTER */
function showCover(){

startBuilder();

document.getElementById("formArea").innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company Name">
<input id="role" placeholder="Job Role">

<textarea id="letter" placeholder="Write Cover Letter"></textarea>

<button class="btn" onclick="downloadPDF()">Download PDF</button>
`;

document.oninput=function(){

document.getElementById("contentArea").innerHTML=`
<h2 style="text-align:center">${document.getElementById("cname").value || ""}</h2>
<p><b>To:</b> ${document.getElementById("company").value || ""}</p>
<p><b>Role:</b> ${document.getElementById("role").value || ""}</p>
<hr>
<p>${document.getElementById("letter").value || ""}</p>
`;
};
}

/* UPLOAD */
function uploadResume(){
let input=document.createElement("input");
input.type="file";
input.click();
}

</script>

</body>
</html>
