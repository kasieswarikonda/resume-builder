<!DOCTYPE html>
<html>
<head>
<title>Resume Builder Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial}

/* NAVBAR */
.navbar{
display:flex;justify-content:space-between;align-items:center;
padding:15px 40px;background:#fff;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.navbar div{display:flex;gap:25px;}
.navbar a{cursor:pointer;text-decoration:none;color:black;font-weight:500;}
.navbar a:hover{color:#4a6cf7;}

.btn{
background:#4a6cf7;color:#fff;padding:8px 15px;
border:none;border-radius:5px;cursor:pointer;
}

/* HERO */
.hero{
background:linear-gradient(to right,#4a6cf7,#6a8dff);
color:white;text-align:center;padding:80px;
}

/* FEATURES */
.features{
display:flex;justify-content:center;gap:20px;padding:40px;
}
.box{
background:#f4f4f4;padding:20px;border-radius:10px;width:200px;text-align:center;
}

/* BUILDER */
#builder{display:none;padding:20px;}
.container{display:flex;gap:20px;}
.form{width:40%;}
.preview{width:60%;background:#fff;padding:20px;border:1px solid #ccc;}

input,textarea{
width:100%;margin:8px 0;padding:10px;
}

/* LOGIN */
#loginBox{
display:none;position:fixed;top:30%;left:40%;
background:white;padding:20px;box-shadow:0 0 10px gray;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>ResumeBuilder</h2>
<div>
<a onclick="goHome()">Resume</a>
<a onclick="showResume()">Resume Builder</a>
<a onclick="showCover()">Cover Letter</a>
<a onclick="showLogin()">Sign In</a>
<button class="btn" onclick="startBuilder()">Get Started</button>
</div>
</div>

<!-- HOME -->
<div id="home">
<div class="hero">
<h1>Create a Professional Resume</h1>
<p>Fast • Easy • Professional</p>
<button class="btn" onclick="startBuilder()">Create My Resume</button>
<button class="btn" onclick="uploadResume()">Upload Resume</button>
</div>

<div class="features">
<div class="box">AI Writer</div>
<div class="box">Easy to Match</div>
<div class="box">Helpful Resources</div>
</div>
</div>

<!-- BUILDER -->
<div id="builder">
<div class="container">

<div class="form" id="formArea"></div>

<div class="preview">
<div style="display:flex;justify-content:space-between;">
<h3>Preview</h3>
<button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>
<hr>
<div id="contentArea">Start entering details...</div>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
<h3>Login</h3>
<input id="user" placeholder="Username"><br><br>
<input id="pass" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<script>

/* NAVIGATION */
function startBuilder(){
home.style.display="none";
builder.style.display="block";
showResume();
}
function goHome(){
home.style.display="block";
builder.style.display="none";
}

/* ================= RESUME ================= */
function showResume(){
formArea.innerHTML=`
<h2>Resume</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">

<textarea id="summary" placeholder="Professional Summary"></textarea>
<textarea id="skills" placeholder="Core Competencies"></textarea>
<textarea id="education" placeholder="Education"></textarea>
<textarea id="experience" placeholder="Work Experience"></textarea>
<textarea id="projects" placeholder="Projects"></textarea>
<textarea id="achievements" placeholder="Achievements"></textarea>

<button class="btn" onclick="saveResume()">Save Resume</button>
`;

loadResume();
}

/* SAVE RESUME */
function saveResume(){
let data={
name:name.value,email:email.value,phone:phone.value,
location:location.value,summary:summary.value,
skills:skills.value,education:education.value,
experience:experience.value,projects:projects.value,
achievements:achievements.value
};
localStorage.setItem("resumeData",JSON.stringify(data));
alert("Resume Saved!");
}

/* LOAD RESUME */
function loadResume(){
let data=JSON.parse(localStorage.getItem("resumeData"));
if(!data) return;
name.value=data.name||""; email.value=data.email||"";
phone.value=data.phone||""; location.value=data.location||"";
summary.value=data.summary||""; skills.value=data.skills||"";
education.value=data.education||""; experience.value=data.experience||"";
projects.value=data.projects||""; achievements.value=data.achievements||"";
}

/* ================= COVER LETTER ================= */
function showCover(){
startBuilder();

formArea.innerHTML=`
<h2>Cover Letter</h2>

<input id="cname" placeholder="Your Name">
<input id="company" placeholder="Company Name">
<input id="role" placeholder="Job Role">
<textarea id="letter" placeholder="Write your cover letter"></textarea>

<button class="btn" onclick="saveCover()">Save Cover Letter</button>
`;

loadCover();
}

/* SAVE COVER */
function saveCover(){
let data={
name:cname.value,company:company.value,
role:role.value,letter:letter.value
};
localStorage.setItem("coverLetterData",JSON.stringify(data));
alert("Cover Letter Saved!");
}

/* LOAD COVER */
function loadCover(){
let data=JSON.parse(localStorage.getItem("coverLetterData"));
if(!data) return;
cname.value=data.name||""; company.value=data.company||"";
role.value=data.role||""; letter.value=data.letter||"";
}

/* ================= PREVIEW ================= */
document.addEventListener("input",function(){

if(document.getElementById("name")){
contentArea.innerHTML=`
<h2>${name.value}</h2>
<p>${location.value} | ${phone.value} | ${email.value}</p>
<hr>
<p>${summary.value}</p>
`;
}

if(document.getElementById("cname")){
contentArea.innerHTML=`
<h2>${cname.value}</h2>
<p>To: ${company.value}</p>
<p><b>Subject:</b> ${role.value}</p>
<hr>
<p>${letter.value}</p>
`;
}

});

/* ================= PDF ================= */
function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let text=contentArea.innerText;
let lines=doc.splitTextToSize(text,180);
doc.text(lines,10,10);
window.open(doc.output("bloburl"));
doc.save("Document.pdf");
}

/* LOGIN */
function showLogin(){loginBox.style.display="block";}
function login(){
localStorage.setItem("user",user.value);
localStorage.setItem("pass",pass.value);
alert("Login Saved");
loginBox.style.display="none";
}

/* UPLOAD */
function uploadResume(){
let input=document.createElement("input");
input.type="file";
input.click();
}

</script>

</body>
</html>
